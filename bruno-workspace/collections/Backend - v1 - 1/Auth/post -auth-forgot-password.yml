info:
  name: post /auth/forgot-password
  type: http
  seq: 6
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/forgot-password"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Recovery email requested
    description: The recovery request was accepted.
    request:
      url: "{{baseUrl}}/auth/forgot-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "developer@example.invalid"
          }
    response:
      status: 200
      statusText: OK
