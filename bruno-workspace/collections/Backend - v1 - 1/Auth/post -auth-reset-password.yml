info:
  name: post /auth/reset-password
  type: http
  seq: 7
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/reset-password"
  body:
    type: json
    data: |-
      {
        "tokenHash": "{{tokenHash}}",
        "password": "{{newPassword}}"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Password reset
    description: Password was updated and all sessions were revoked.
    request:
      url: "{{baseUrl}}/auth/reset-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "tokenHash": "example-recovery-token-hash",
            "password": "Replace-with-another-secure-password-456!"
          }
    response:
      status: 204
      statusText: No Content
