info:
  name: get /health
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Healthy
    description: The API and database connection are healthy.
    request:
      url: "{{baseUrl}}/health"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "Healthy!",
            "database": "Connected"
          }
  - name: 503 Database unavailable
    description: The API is running but could not connect to the database.
    request:
      url: "{{baseUrl}}/health"
      method: GET
    response:
      status: 503
      statusText: Service Unavailable
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "Unhealthy",
            "database": "Not Connected"
          }
