info:
  name: get /timetable
  type: http
  seq: 2
  tags:
    - Timetable

http:
  method: GET
  url: "{{baseUrl}}/timetable"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Timetable summaries
    description: Returns the authenticated user's main timetables.
    request:
      url: "{{baseUrl}}/timetable"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133",
              "name": "Semester 1 Plan",
              "semester": 1,
              "academicYear": "2026-2027",
              "createdAt": "2026-07-21T09:30:00Z"
            },
            {
              "id": "6ba7b810-9dad-11d1-80b4-00c04fd430c8",
              "name": "Semester 2 Plan",
              "semester": 2,
              "academicYear": "2026-2027",
              "createdAt": "2026-07-21T09:45:00Z"
            }
          ]
