info:
  name: post /timetable
  type: http
  seq: 1
  tags:
    - Timetable

http:
  method: POST
  url: "{{baseUrl}}/timetable"
  body:
    type: json
    data: |-
      {
        "name": "Semester 1 Plan",
        "semester": 1,
        "academicYear": "2026-2027",
        "metaData": [
          {
            "moduleCode": "CS2103T",
            "lessonNo": "T01",
            "lessonType": "Tutorial",
            "colour": "#3B82F6"
          },
          {
            "moduleCode": "CS2103T",
            "lessonNo": "L1",
            "lessonType": "Lecture",
            "colour": "#3B82F6"
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (res.getStatus() === 201 && data.id) {
          bru.setEnvVar("timetableId", data.id, { persist: false });
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Timetable created
    description: Creates a timetable and its associated room.
    request:
      url: "{{baseUrl}}/timetable"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "Semester 1 Plan",
            "semester": 1,
            "academicYear": "2026-2027",
            "metaData": [
              {
                "moduleCode": "CS2103T",
                "lessonNo": "T01",
                "lessonType": "Tutorial",
                "colour": "#3B82F6"
              }
            ]
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
        - name: Location
          value: http://localhost:5233/timetable/2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133
      body:
        type: json
        data: |-
          {
            "id": "2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133",
            "name": "Semester 1 Plan",
            "semester": 1,
            "academicYear": "2026-2027",
            "createdAt": "2026-07-21T09:30:00Z",
            "metaData": [
              {
                "moduleCode": "CS2103T",
                "lessonNo": "T01",
                "lessonType": "Tutorial",
                "colour": "#3B82F6"
              }
            ]
          }
