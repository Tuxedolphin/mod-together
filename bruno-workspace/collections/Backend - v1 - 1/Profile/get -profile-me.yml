info:
  name: get /profile/me
  type: http
  seq: 1
  tags:
    - Profile

http:
  method: GET
  url: "{{baseUrl}}/profile/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Initialised profile
    description: All profile fields have been configured.
    request:
      url: "{{baseUrl}}/profile/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "userId": "7d444840-9dc0-11d1-b245-5ffdce74fad2",
            "username": "Ada Lovelace",
            "handle": "ada-lovelace",
            "colour": "#3B82F6",
            "defaultTheme": "dark",
            "avatarUrl": "https://project.supabase.co/storage/v1/object/public/avatars/7d444840-9dc0-11d1-b245-5ffdce74fad2/avatar.webp?v=1784592000"
          }
  - name: 200 Uninitialised profile
    description: Stable profile keys use null when a value has not been configured.
    request:
      url: "{{baseUrl}}/profile/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "userId": "7d444840-9dc0-11d1-b245-5ffdce74fad2",
            "username": null,
            "handle": null,
            "colour": null,
            "defaultTheme": null,
            "avatarUrl": null
          }
