info:
  name: put /profile/me
  type: http
  seq: 3
  tags:
    - Profile

http:
  method: PUT
  url: "{{baseUrl}}/profile/me"
  body:
    type: json
    data: |-
      {
        "username": "{{username}}",
        "handle": "{{handle}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Profile updated
    description: Username and handle were updated for the authenticated user.
    request:
      url: "{{baseUrl}}/profile/me"
      method: PUT
      body:
        type: json
        data: |-
          {
            "username": "Ada Lovelace",
            "handle": "ada-lovelace"
          }
    response:
      status: 204
      statusText: No Content
