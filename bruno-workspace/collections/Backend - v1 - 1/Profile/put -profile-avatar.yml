info:
  name: put /profile/avatar
  type: http
  seq: 5
  tags:
    - Profile

docs: Select a square image file. The backend converts it to a 256x256 WebP avatar.

http:
  method: PUT
  url: "{{baseUrl}}/profile/avatar"
  body:
    type: multipartForm
    multipartForm:
      - name: file
        type: file
        value: []
        enabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Avatar uploaded
    description: Returns the complete profile with the new avatar URL.
    request:
      url: "{{baseUrl}}/profile/avatar"
      method: PUT
      body:
        type: multipartForm
        multipartForm:
          - name: file
            type: file
            value: []
            enabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "userId": "7d444840-9dc0-11d1-b245-5ffdce74fad2",
            "username": "Ada Lovelace",
            "handle": "ada-lovelace",
            "colour": "#3B82F6",
            "defaultTheme": "dark",
            "avatarUrl": "https://project.supabase.co/storage/v1/object/public/avatars/7d444840-9dc0-11d1-b245-5ffdce74fad2/avatar.webp?v=1784592000"
          }
